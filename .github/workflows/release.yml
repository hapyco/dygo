name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/studio/ui/package-lock.json

      - name: Build Studio UI
        working-directory: apps/studio/ui
        run: |
          npm ci
          rm -f ../../../internal/studio/bundled/index.html
          find ../../../internal/studio/bundled/assets -type f ! -name placeholder.txt -delete
          npm run build:embed

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          mkdir -p dist/build
          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "linux/amd64"
            "linux/arm64"
            "windows/amd64"
            "windows/arm64"
          )
          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            name="dygo_${version}_${goos}_${goarch}"
            binary="dygo"
            if [ "$goos" = "windows" ]; then
              binary="dygo.exe"
            fi
            rm -rf "dist/build/${name}"
            mkdir -p "dist/build/${name}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 go build \
              -ldflags "-s -w -X github.com/dygo-dev/dygo/internal/cli.version=${version}" \
              -o "dist/build/${name}/${binary}" ./cmd/dygo
            if [ "$goos" = "windows" ]; then
              (cd "dist/build/${name}" && zip -q "../../${name}.zip" "$binary")
            else
              tar -C "dist/build/${name}" -czf "dist/${name}.tar.gz" "$binary"
            fi
          done
          (cd dist && sha256sum dygo_* > checksums.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/dygo_* dist/checksums.txt \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "dygo ${GITHUB_REF_NAME}"
