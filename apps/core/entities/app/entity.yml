label: App
description: Runtime state for an installed App.
icon: package
is-system: true
name:
  strategy: manual
  label: Name
fields:
  - name: label
    label: Label
    type: text
    required: true

  - name: version
    label: Version
    type: text
    required: true

  - name: status
    label: Status
    type: select
    required: true
    default: active
    options:
      values:
        - installed
        - active
        - disabled
        - pending-install
        - pending-upgrade
        - failed
