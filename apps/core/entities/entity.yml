name: entity
label: Entity
description: Registry entry for a known Entity definition.
naming:
  strategy: field
  field: name
fields:
  - name: app
    label: App
    type: link
    required: true
    index: true
    options:
      entity: app

  - name: name
    label: Name
    type: text
    required: true
    index: true

  - name: route-slug
    label: Route Slug
    type: text
    required: true
    unique: true
    index: true

  - name: label
    label: Label
    type: text
    required: true

  - name: description
    label: Description
    type: long-text

  - name: naming
    label: Naming
    type: json

constraints:
  - type: unique
    fields: [app, name]
