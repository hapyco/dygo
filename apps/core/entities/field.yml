name: field
label: Field
description: Field definition belonging to an Entity.
naming:
  strategy: random
fields:
  - name: entity
    label: Entity
    type: link
    required: true
    index: true
    options:
      entity: entity

  - name: field-name
    label: Field Name
    type: text
    required: true
    index: true

  - name: label
    label: Label
    type: text
    required: true

  - name: type
    label: Type
    type: text
    required: true
    index: true

  - name: required
    label: Required
    type: boolean
    default: false

  - name: unique
    label: Unique
    type: boolean
    default: false

  - name: index
    label: Index
    type: boolean
    default: false

  - name: default
    label: Default
    type: json

  - name: check
    label: Check
    type: json

  - name: position
    label: Position
    type: int

  - name: options
    label: Options
    type: json

constraints:
  - type: unique
    fields: [entity, field-name]
