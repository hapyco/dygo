label: Permission
description: Role access rule for an Entity.
icon: key-round
name:
  strategy: random
fields:
  - name: entity
    label: Entity
    type: link
    required: true
    index: true
    options:
      entity: entity

  - name: role
    label: Role
    type: link
    required: true
    index: true
    options:
      entity: role

  - name: read
    label: Read
    type: boolean
    default: false

  - name: create
    label: Create
    type: boolean
    default: false

  - name: update
    label: Update
    type: boolean
    default: false

  - name: delete
    label: Delete
    type: boolean
    default: false

  - name: export
    label: Export
    type: boolean
    default: false

  - name: print
    label: Print
    type: boolean
    default: false

constraints:
  - type: unique
    fields: [entity, role]
