label: Naming Series
description: Transactional counter state for series-based Record names.
icon: hash
is-system: true
name:
  strategy: format
  format: "{key}"
fields:
  - name: entity
    label: Entity
    type: link
    required: true
    index: true
    options:
      entity: entity

  - name: key
    label: Key
    type: text
    required: true
    unique: true

  - name: pattern
    label: Pattern
    type: text
    required: true

  - name: current
    label: Current
    type: bigint
    required: true
    default: 0
