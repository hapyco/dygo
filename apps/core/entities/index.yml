name: index
label: Index
description: Top-level non-unique index definition belonging to an Entity.
icon: list-tree
naming:
  strategy: random
fields:
  - name: entity
    label: Entity
    type: link
    required: true
    index: true
    options:
      entity: entity

  - name: index-name
    label: Index Name
    type: text
    required: true
    index: true

  - name: fields
    label: Fields
    type: json
    required: true

  - name: position
    label: Position
    type: int

constraints:
  - type: unique
    fields: [entity, index-name]
