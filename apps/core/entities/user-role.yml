name: user-role
label: User Role
description: Role assignment for a User.
icon: users-round
naming:
  strategy: random
fields:
  - name: user
    label: User
    type: link
    required: true
    index: true
    options:
      entity: user

  - name: role
    label: Role
    type: link
    required: true
    index: true
    options:
      entity: role

constraints:
  - type: unique
    fields: [user, role]
