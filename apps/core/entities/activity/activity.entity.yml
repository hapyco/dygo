label: Activity
description: Timeline entry for meaningful Record and system events.
icon: activity
is-system: true
name:
  strategy: random
fields:
  - name: kind
    label: Kind
    type: select
    required: true
    default: record
    options:
      values:
        - record
        - comment
        - workflow
        - job
        - email
        - attachment
        - auth
        - system

  - name: operation
    label: Operation
    type: select
    required: true
    options:
      values:
        - create
        - update
        - delete
        - restore
        - comment
        - workflow-transition
        - job-completed
        - email-sent
        - attachment-added
        - login
        - logout
        - system

  - name: status
    label: Status
    type: select
    required: true
    default: success
    options:
      values:
        - success
        - failed

  - name: entity
    label: Entity
    type: link
    options:
      entity: entity
      foreign-key: false

  - name: record-id
    label: Record ID
    type: bigint

  - name: actor
    label: Actor
    type: link
    options:
      entity: user
      foreign-key: false

  - name: title
    label: Title
    type: text
    required: true

  - name: message
    label: Message
    type: long-text

  - name: changes
    label: Changes
    type: json

  - name: snapshot
    label: Snapshot
    type: json

  - name: details
    label: Details
    type: json

indexes:
  - name: by-record
    fields: [entity, record-id]
