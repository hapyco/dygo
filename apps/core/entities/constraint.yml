label: Constraint
description: Top-level unique or check constraint definition belonging to an Entity.
icon: shield-check
is-system: true
name:
  strategy: format
  format: "{entity}.{constraint-name}"
fields:
  - name: entity
    label: Entity
    type: link
    required: true
    index: true
    options:
      entity: entity

  - name: constraint-name
    label: Constraint Name
    type: text
    required: true
    index: true

  - name: type
    label: Type
    type: select
    required: true
    index: true
    options:
      values:
        - unique
        - check

  - name: field-names
    label: Field Names
    type: json

  - name: field
    label: Field
    type: text

  - name: operator
    label: Operator
    type: select
    options:
      values:
        - eq
        - neq
        - gt
        - gte
        - lt
        - lte
        - in
        - not-in

  - name: value
    label: Value
    type: json

  - name: position
    label: Position
    type: int
