# GitHub repository and issue-tracking metadata for maintainers and agents.
#
# This file intentionally stores only public/non-secret identifiers.

repository:
  owner: hapyco
  name: dygo
  full_name: hapyco/dygo
  url: https://github.com/hapyco/dygo

issues:
  cli:
    list_open: gh issue list --repo hapyco/dygo --state open --json number,title,state,labels,url --limit 200
    list_all: gh issue list --repo hapyco/dygo --state all --json number,title,state,labels,url --limit 300
    view: gh issue view ISSUE_NUMBER --repo hapyco/dygo --json number,title,body,state,labels,url
    create: gh issue create --repo hapyco/dygo --title TITLE --body BODY
    close: gh issue close ISSUE_NUMBER --repo hapyco/dygo
